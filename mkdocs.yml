site_name: Java Web 开发技术
site_description: 武汉工商学院《Java Web开发技术》课程电子教材
site_url: https://dedeguo.github.io/javaweb-course-docs

theme:
  name: material
  custom_dir: overrides  # 添加这一行，告诉 MkDocs 去哪里找自定义模板
  language: zh
  palette: 
    primary: indigo
    accent: blue
  features:
    # - navigation.instant

    - search.highlight
    - search.suggest
    - content.code.copy
    # - toc.integrate
    - navigation.indexes        # 允许点击目录本身进入页面
    - navigation.sections       # 将一级目录作为"区段"标题（不折叠），视觉更清晰
    # - navigation.expand         # (可选) 默认展开所有目录，方便学生通过 Ctrl+F 搜索
    - navigation.top            # 返回顶部按钮
    - navigation.tracking       # 滚动时侧边栏自动高亮当前章节
    - toc.follow                # 右侧目录跟随滚动

nav:
  - 课程介绍:
      - 课程介绍: index.md
      # - 教学大纲: syllabus.md
  - 第一篇｜开发环境与效能工具: 
      - 第1章 导读: chapter01/index.md
      - 01.开发环境安装: chapter01/01-env-setup.md
      - 02.工程化基石：Git与Maven: chapter01/02-maven-git.md
      - 03.AI 结对编程 : chapter01/03-ai-tools.md
      - 实验1：Web环境与AI助手: chapter01/lab1.md
  - 第二篇｜Web 底层原理:  
      - 第2章 导读: chapter02/index.md
      - 01.HTTP 协议与调试工具: chapter02/01-http-protocol.md
      - 02. Servlet 基础: chapter02/02-servlet-basics.md    
      - 03. 请求与响应 (Req & Resp): chapter02/03-request-response.md
      - 04. JSON 数据交互: chapter02/04-json-interaction.md  
      - 05. 会话与状态 (Session): chapter02/05-state-management.md 
      - 06. 过滤器与监听器: chapter02/06-filter-listener.md
      - 07. JDBC 与连接池 Druid: chapter02/07-jdbc-core.md
      - 08. 告别 JDBC 泥潭：MyBatis 初体验: chapter02/08-mybatis-intro.md
      - 09. 图书管理模块 CRUD 详解: chapter02/09-servlet-crud.md
      - 实验 2：Web 核心综合实战: chapter02/lab2.md
  - 第三篇｜Spring Boot 核心开发:
      - 第3章 导读: chapter03/index.md
      - 01. 框架革命：Spring Boot 快速入门 : chapter03/01-springboot-start.md
      - 02. 核心原理：IOC 容器与依赖注入 (DI): chapter03/02-ioc-di.md
      - 03. 接口规范：RESTful 风格与统一响应: chapter03/03-restful-api.md
      - 04. 架构设计：分层解耦 (Controller-Service-Dao):  chapter03/04-architecture.md
      - 05. 全局兜底：异常处理与 AOP 简介:  chapter03/05-exception-aop.md        # 实战：@RestControllerAdvice
      - 06. 生产级基石：日志管理与单元测试: chapter03/06-test-logging.md
      - 实验3：构建标准化的 RESTful 后端系统:  chapter03/lab3.md     # 综合实战
  
  - 第四篇｜MyBatis 数据持久化 :
      - 第4章 导读: chapter04/index.md
      - 01. ORM 思想与 MyBatis 初探:  chapter04/01-orm-intro.md
      - 02. 整合数据库 (Spring Boot + MySQL): chapter04/02-integrate-mysql.md
      - 03. Mapper接口与XML映射:   chapter04/03-mapper-xml.md
      - 04. MyBatis 的杀手锏：动态 SQL:  chapter04/04-dynamic-sql.md
      - 05. 插件生态：PageHelper 分页查询:  chapter04/05-pagehelper.md
      - 06. 事务管理：@Transactional 与 ACID:  chapter04/06-transaction.md
      - 实验4：数据落地——从内存 Map 到 MySQL:  chapter04/lab4.md
      
  - 第五篇｜AI 集成与智能体基础:
      - 第5章 导读: chapter05/index.md
      - 01. Java 也就是个“浏览器”：HTTP Client 调用 AI: chapter05/01-ai-api.md
      - 02. 提示词工程与Java模板: chapter05/02-prompt-java.md
      - 03. 让 AI 说“机器话”：JSON Schema 与解析: chapter05/03-structured-output.md
      - 04. 赋予 AI 双手：Tool Calling:  chapter05/04-tool-calling.md
      - 05. 简化开发：拥抱 Spring AI 框架: chapter05/05-spring-ai.md
      - 06. 未来的标准：MCP简介: chapter05/06-mcp-intro.md
      - 实验5：智能客服Agent实战: chapter05/lab5.md

  - 第六篇｜综合项目实战:
      - 第6章 导读: chapter06/index.md
      - 01. 需求分析与建模(Visual Modeling): chapter06/01-design.md
      - 02. 核心业务开发(AI 辅助编码): chapter06/02-implementation.md
      - 03. 智能体集成(Tool Calling 实战): chapter06/03-agent-integration.md
    #   - 04. 信创部署实战: chapter06/04-deployment.md
      - 实验6 二手书交易智能体: chapter06/lab6.md

  - 📚 附录 进阶资源与内功修炼:
      - 🛠️ A. 开发环境与工具链:
          - A01. 开发者账号与工具权益申请指南: appendix/a01-account-guide.md
        #   - A01. 基于 VMware 的国产化环境搭建: appendix/a01-vmware-kylin.md
          - A02. Docker 容器化部署实战: appendix/a02-docker-deploy.md
          - A03. OpenGauss 数据库安装指南: appendix/a03-opengauss-setup.md
    #       - A04. 常用开发工具清单 (Maven/插件): appendix/a04-devtools.md
    #       - A05. 结对编程：AI 辅助工具配置: appendix/a05-ai-coding.md
          - A06. 零成本体验专属 AI 助理 CoPaw: appendix/a06-copaw-tutorial.md
      - 🔋 B. Java 基础补给站:
          - B01. 万物起源：从 HelloWorld 到对象: appendix/b01-oop-basics.md
          - B02. 语法贴纸：重写、重载与注解: appendix/b02-annotation.md
          - B03. 框架黑客：Class 说明书与反射: appendix/b03-class-reflection.md
          - B04. 超级容器：泛型标签与集合大军: appendix/b04-generics-collections.md
          - B05. 数据管道：文件与网络 I/O 流: appendix/b05-file-network-io.md
          - B06. 事故救援：异常捕获与 JUnit 质检: appendix/b06-exception-junit
    #   - 🥋 C. 源码级内功修炼 (选修):
    #       - C01. Servlet 规范核心解读: appendix/c01-servlet-spec.md
    #       - C02. 手写 Tomcat：容器原理: appendix/c02-tomcat4-source.md
    #       - C03. Spring IOC/AOP 源码导读: appendix/c03-spring-core.md
    #       - C04. MyBatis 源码执行流程: appendix/c04-mybatis-source.md
      - 🤖 D. Spring AI 框架尝鲜:
          - D01. 快速接入 OpenAI/国产大模型: appendix/d01-spring-ai-quickstart.md
          - D02. 简单的 RAG 实现 (课程助教): appendix/d02-simple-rag.md
      - 🔭 E. 职业视野与资源库:
          - E01. Java Web 行业全景报告: appendix/e01-industry-report.md
          - E02. 精选开源项目库: appendix/e02-opensource-projects.md    
plugins:
  - search:
      lang: zh
  # - print-site:
  #     add_to_navigation: true # 在导航栏添加“打印页”链接
  #     print_page_title: '打印完整文档'

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # 启用 SuperFences 扩展，它是处理高级代码块的基础
  - pymdownx.superfences:
      # 自定义栅栏块，告诉它如何处理 mermaid
      custom_fences:
        - name: mermaid
          class: mermaid
          # 使用特定的格式化器将代码转换为图表
          format: !!python/name:pymdownx.superfences.fence_code_format
  - footnotes
  - attr_list
  - def_list
  - md_in_html

# 在 mkdocs.yml 的最外层添加（注意缩进，不要放在 plugins 或 nav 里面）
extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

# 如果您希望图表颜色能随主题（亮/暗）自动切换，建议添加这个 CSS（可选）
extra_css:
  - https://unpkg.com/mermaid/dist/mermaid.min.css # (注：新版 mermaid 其实通常不需要这个，但加上也没坏处，主要靠 JS)

